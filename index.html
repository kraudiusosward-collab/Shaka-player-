<!doctype html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Kraudius TV</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.2/shaka-player.ui.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.2/controls.css">

    <style>

        html, body {

            margin: 0;

            padding: 0;

            background: #000;

            width: 100%;

            height: 100%;

        }

        #videoContainer {

            width: 100%;

            height: 100%;

        }

        video {

            width: 100%;

            height: 100%;

        }

    </style>

</head>

<body>

    <div id="videoContainer">

        <video id="video" autoplay playsinline></video>

    </div>

    <script>

        const video = document.getElementById("video");

        const player = new shaka.Player(video);

        const ui = new shaka.ui.Overlay(player, video.parentElement, video);

        /* DEFAULT UI CONTROLS */

        ui.configure({

            controlPanelElements: [

                'play_pause',

                'time_and_duration',

                'spacer',

                'mute',

                'volume',

                'language',

                'quality',

                'fullscreen'

            ]

        });

        // Weka URL yako ya DASH MPD hapa

        const mpdUrl = "https://cdnblncr.azamtvltd.co.tz/live/eds/AzamSport1/DASH/AzamSport1.mpd?cdntoken=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzUxMiJ9.eyJleHAiOjE3NzYzNjc0NDIsInNpcCI6IjE4LjY4LjI4LjE3MCJ9.lU0ypsk_NP3BbQ4b0yJnXmHAwLaIErsokfiBDeDtBkWt5ttNNDYbjqBqR1WVJb-cUsf7DkFFO-VGaYYZsoH1sA"; 

        // Weka ClearKey yako hapa kwa mfumo wa "kid:key"

        const clearKey = "c31df1600afc33799ecac543331803f2:dd2101530e222f545997d4c553787f85"; 

        (async () => {

            if (clearKey) {

                const [kid, key] = clearKey.split(":");

                player.configure({

                    drm: {

                        clearKeys: {

                            [kid]: key

                        }

                    }

                });

            }

            if (mpdUrl) {

                await player.load(mpdUrl);

            } else {

                console.warn("Tafadhali weka 'mpdUrl' ili kuanza kucheza video.");

            }

        })();

    </script>

</body>

	</html>
